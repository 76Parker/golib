logger:
  only_stdout: true
  level: "info"
  enable_caller: true
  log_file: "./test.log"
  rotation:
    max_size_mb: 5 # в MB (размер файла после которого файл будет считаться старым log-файлом и создастся новый)
    max_age_days: 1 # количество дней которое может жить старый log-файл
    max_backups: 10 # количество старых log-файлов которые могут лежать
    local_time: true # использовать ли локальное время хоста для названия старых log-файлов на котором работает процесс
    compress: false # использовать ли gzip-компрессию для старых log-файлов
